services:
  mongo:
    image: mongo:6.0
    container_name: mongo
    restart: unless-stopped
    # Mongo is only used by the backend inside the Docker network.
    # Leaving it unexposed avoids "port 27017 already in use" on dev machines.
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - MONGODB_DB=altrium
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
        VITE_REGISTRY_ADDRESS: "0xc2Bf6D24d9B35F8F9780b22a71aD756aBe62B2Df"
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  mongo_data:
  uploads:

